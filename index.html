<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>ROAD RUSH — 카 레이싱</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { height:100%; background:#0a0a12; overflow:hidden; font-family:'Segoe UI',sans-serif; }
  #wrap { position:relative; width:100vw; height:100vh; display:flex; align-items:center; justify-content:center; background:#0a0a12; }
  canvas { display:block; background:#1a1a22; box-shadow:0 0 60px rgba(0,0,0,.6); }
  #hud {
    position:absolute; top:18px; left:0; right:0;
    display:flex; justify-content:space-between; padding:0 26px;
    color:#fff; font-weight:700; letter-spacing:1px;
    text-shadow:0 0 8px rgba(255,204,0,.6), 0 2px 6px rgba(0,0,0,.6);
    pointer-events:none; font-size:18px;
  }
  #best { opacity:.75; font-size:14px; }
  #speedWrap {
    position:absolute; bottom:22px; right:26px;
    color:#fff; text-align:right; pointer-events:none;
    text-shadow:0 2px 6px rgba(0,0,0,.6);
  }
  #speedVal { font-size:34px; font-weight:800; letter-spacing:1px; }
  #speedLabel { font-size:12px; opacity:.7; letter-spacing:2px; }
  #overlay {
    position:absolute; inset:0; display:flex; flex-direction:column;
    align-items:center; justify-content:center; text-align:center; gap:14px;
    color:#fff8ec;
    background:radial-gradient(circle at 50% 35%, rgba(60,20,10,.7), rgba(6,3,10,.93));
  }
  #overlay h1 {
    font-size:42px; letter-spacing:5px;
    background:linear-gradient(90deg,#ffcc00,#ff5533);
    -webkit-background-clip:text; background-clip:text; color:transparent;
    text-shadow:0 0 30px rgba(255,120,0,.35);
  }
  #overlay p { opacity:.9; font-size:14.5px; line-height:1.9; max-width:420px; }
  #overlay .kbd {
    display:inline-block; background:rgba(255,255,255,.12);
    border:1px solid rgba(255,204,0,.5); border-radius:6px;
    padding:2px 9px; margin:0 3px; font-size:12.5px; color:#ffe9a8;
  }
  #overlay button {
    margin-top:6px; padding:13px 34px; font-size:16px; font-weight:800; letter-spacing:1px;
    border:none; border-radius:30px; cursor:pointer; color:#1a0d05;
    background:linear-gradient(135deg,#ffcc00,#ff5533);
    box-shadow:0 8px 24px rgba(255,90,30,.4); transition:transform .15s ease;
  }
  #overlay button:hover { transform:translateY(-2px) scale(1.03); }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="game" width="480" height="720"></canvas>
  <div id="hud">
    <div id="score">거리 0m</div>
    <div id="best">최고기록 0m</div>
  </div>
  <div id="speedWrap">
    <div id="speedVal">0</div>
    <div id="speedLabel">KM/H</div>
  </div>
  <div id="overlay">
    <h1>ROAD RUSH</h1>
    <p>
      <span class="kbd">←</span><span class="kbd">→</span> / <span class="kbd">A</span><span class="kbd">D</span> 차선 변경<br>
      <span class="kbd">↑</span> / <span class="kbd">W</span> 가속 &nbsp; <span class="kbd">↓</span> / <span class="kbd">S</span> 감속<br>
      구불구불한 도로에서 마주 오는 차들을 피해 최대한 멀리 달려보세요.<br>
      도로 밖으로 나가거나 다른 차와 부딪히면 게임 오버!
    </p>
    <button id="startBtn">시작하기</button>
  </div>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

const scoreEl = document.getElementById('score');
const bestEl = document.getElementById('best');
const speedVal = document.getElementById('speedVal');
const overlay = document.getElementById('overlay');
const startBtn = document.getElementById('startBtn');

let best = 0;

// ---------------- 도로 설정 ----------------
const ROAD_BASE_WIDTH = 300;   // 화면 기준 도로 폭(원근 미적용, 탑뷰 고정폭)
const LANE_COUNT = 3;
const CAR_W = 40, CAR_H = 68;

// ---------------- 플레이어 ----------------
const player = {
  x: 0,       // 도로 중심 기준 좌우 오프셋
  y: H - 140,
  speed: 0,
  maxSpeed: 260,
  accel: 140,
  brake: 220,
  friction: 60,
  steer: 0
};

let running = false;
let gameOver = false;
let distance = 0;
let roadOffset = 0;      // 도로 커브용 누적 오프셋
let curve = 0;            // 현재 커브 값 (도로 중심 x 오프셋)
let curveTarget = 0;
let curveTimer = 0;

let traffic = [];        // 상대 차량들
let spawnCooldown = 0;
let particles = [];
let shake = 0;

function resetGame(){
  player.x = 0;
  player.y = H - 140;
  player.speed = 60;
  distance = 0;
  roadOffset = 0;
  curve = 0;
  curveTarget = 0;
  curveTimer = 0;
  traffic = [];
  spawnCooldown = 1.2;
  particles = [];
  shake = 0;
  gameOver = false;
}

// ---------------- 입력 ----------------
const keys = {};
window.addEventListener('keydown', (e)=>{
  if(['ArrowLeft','ArrowRight','ArrowUp','ArrowDown','KeyA','KeyD','KeyW','KeyS','Space'].includes(e.code)) e.preventDefault();
  keys[e.code] = true;
  if(e.code === 'Space' && !running){ startGame(); }
});
window.addEventListener('keyup', (e)=>{ keys[e.code] = false; });
startBtn.addEventListener('click', startGame);

function startGame(){
  overlay.style.display = 'none';
  resetGame();
  running = true;
}

function endGame(){
  running = false;
  gameOver = true;
  const m = Math.floor(distance/8);
  best = Math.max(best, m);
  bestEl.textContent = `최고기록 ${best}m`;
  overlay.style.display = 'flex';
  overlay.querySelector('h1').textContent = 'GAME OVER';
  overlay.querySelector('p').innerHTML =
    `이번 기록: <b>${m}m</b><br><span class="kbd">Space</span> 로 다시 시작`;
  startBtn.textContent = '다시 시작';
}

// ---------------- 도로 폭/커브 계산 ----------------
function roadHalfWidthAt(){
  return ROAD_BASE_WIDTH/2;
}

function roadCenterX(){
  return W/2 + curve;
}

// ---------------- 트래픽 생성 ----------------
function spawnTraffic(){
  const laneIdx = Math.floor(Math.random()*LANE_COUNT);
  const laneW = ROAD_BASE_WIDTH/LANE_COUNT;
  const laneX = -ROAD_BASE_WIDTH/2 + laneW*(laneIdx+0.5);
  const colors = ['#ff5566','#5599ff','#ffcc33','#aa66ff','#33dd88'];
  traffic.push({
    laneX,
    y: -100,
    speed: 70 + Math.random()*60,
    color: colors[Math.floor(Math.random()*colors.length)],
    w: CAR_W, h: CAR_H
  });
}

function spawnParticle(x,y,color){
  for(let i=0;i<10;i++){
    particles.push({
      x, y,
      vx:(Math.random()-0.5)*180,
      vy:(Math.random()-0.5)*180,
      life:0.5,
      color
    });
  }
}

// ---------------- 업데이트 ----------------
let lastT = performance.now();
function update(dt){
  if(!running) return;

  // 거리가 늘어날수록 최고 속도와 최저 속도(자연 가속)가 함께 높아짐
  player.maxSpeed = Math.min(260 + distance*0.35, 460);
  const minSpeed = Math.min(40 + distance*0.12, 160);

  // 가속/감속
  const accelInput = keys['ArrowUp']||keys['KeyW'];
  const brakeInput = keys['ArrowDown']||keys['KeyS'];
  if(accelInput) player.speed += player.accel*dt;
  else if(brakeInput) player.speed -= player.brake*dt;
  else player.speed -= player.friction*dt;
  player.speed = Math.max(minSpeed, Math.min(player.maxSpeed, player.speed));

  distance += player.speed*dt*0.12;
  speedVal.textContent = Math.floor(player.speed);

  // 좌우 스티어링
  const steerInput = (keys['ArrowLeft']||keys['KeyA'] ? -1:0) + (keys['ArrowRight']||keys['KeyD'] ? 1:0);
  player.x += steerInput * 220 * dt;

  // 커브 진행 (플레이어 속도에 비례해 도로가 흘러감)
  const scrollSpeed = player.speed;
  roadOffset += scrollSpeed*dt;

  curveTimer -= dt;
  if(curveTimer <= 0){
    curveTarget = (Math.random()-0.5) * 160;
    curveTimer = 2.4 + Math.random()*2.2;
  }
  curve += (curveTarget - curve) * Math.min(0.6*dt, 1);
  // 커브가 플레이어를 옆으로 밀어내는 느낌 (핸들링 압박)
  player.x -= (curveTarget - curve) * 0.02;

  const halfW = roadHalfWidthAt() - CAR_W/2 - 6;
  if(player.x < -halfW || player.x > halfW){
    // 도로 이탈
    shake = 0.4;
    player.speed *= 0.98;
    if(player.x < -halfW - 30 || player.x > halfW + 30){
      spawnParticle(roadCenterX()+player.x, player.y, '#888');
      endGame();
      return;
    }
  }

  // 트래픽 스폰
  spawnCooldown -= dt;
  if(spawnCooldown <= 0){
    spawnTraffic();
    spawnCooldown = Math.max(0.55, 1.5 - distance*0.0015);
  }

  // 트래픽 이동 & 충돌
  const px = roadCenterX() + player.x;
  for(const t of traffic){
    t.y += (scrollSpeed + t.speed) * dt;
    const tx = roadCenterX() + t.laneX + curve*0.0; // 차선은 커브 따라 함께 흐름(centerX가 이미 반영)
    if(rectsOverlap(px-CAR_W/2, player.y-CAR_H/2, CAR_W, CAR_H,
                     tx-t.w/2, t.y-t.h/2, t.w, t.h)){
      shake = 0.6;
      spawnParticle(px, player.y, '#ffcc33');
      endGame();
      return;
    }
  }
  traffic = traffic.filter(t=>t.y < H+120);

  // 파티클
  for(const p of particles){
    p.x += p.vx*dt; p.y += p.vy*dt; p.life -= dt;
  }
  particles = particles.filter(p=>p.life>0);

  shake = Math.max(0, shake-dt*1.5);

  scoreEl.textContent = `거리 ${Math.floor(distance/8)}m`;
}

function rectsOverlap(x1,y1,w1,h1,x2,y2,w2,h2){
  return x1 < x2+w2 && x1+w1 > x2 && y1 < y2+h2 && y1+h1 > y2;
}

// ---------------- 렌더 ----------------
function drawRoad(){
  const cx = roadCenterX();
  const halfW = roadHalfWidthAt();

  // 잔디/배경
  ctx.fillStyle = '#173a1c';
  ctx.fillRect(0,0,W,H);
  // 갓길 패턴
  const stripeH = 40;
  const off = (roadOffset*0.6) % (stripeH*2);
  ctx.fillStyle = '#1e4423';
  for(let y=-stripeH*2; y<H+stripeH*2; y+=stripeH*2){
    ctx.fillRect(0, y+off, W, stripeH);
  }

  // 도로 본체
  ctx.fillStyle = '#2b2b33';
  ctx.fillRect(cx-halfW, 0, halfW*2, H);

  // 도로 가장자리 라인
  ctx.fillStyle = '#ffdd55';
  ctx.fillRect(cx-halfW-4, 0, 5, H);
  ctx.fillRect(cx+halfW-1, 0, 5, H);

  // 차선 점선
  const laneW = (halfW*2)/LANE_COUNT;
  ctx.fillStyle = 'rgba(255,255,255,0.65)';
  const dashLen = 34, dashGap = 26;
  const scroll = roadOffset % (dashLen+dashGap);
  for(let i=1;i<LANE_COUNT;i++){
    const lx = cx - halfW + laneW*i;
    for(let y=-dashLen; y<H+dashLen; y+=dashLen+dashGap){
      ctx.fillRect(lx-2, y+scroll, 4, dashLen);
    }
  }
}

function drawCar(x,y,w,h,bodyColor,windowColor){
  ctx.save();
  ctx.translate(x,y);
  // 그림자
  ctx.fillStyle = 'rgba(0,0,0,0.35)';
  roundRect(ctx, -w/2+3, -h/2+6, w, h, 8);
  ctx.fill();
  // 차체
  const grad = ctx.createLinearGradient(0,-h/2,0,h/2);
  grad.addColorStop(0, lighten(bodyColor, 25));
  grad.addColorStop(1, bodyColor);
  ctx.fillStyle = grad;
  roundRect(ctx, -w/2, -h/2, w, h, 9);
  ctx.fill();
  // 창문
  ctx.fillStyle = windowColor;
  roundRect(ctx, -w/2+6, -h/2+10, w-12, h*0.32, 5);
  ctx.fill();
  roundRect(ctx, -w/2+6, h*0.06, w-12, h*0.28, 5);
  ctx.fill();
  // 헤드라이트
  ctx.fillStyle = '#fff3b0';
  ctx.fillRect(-w/2+3, -h/2+2, 7, 5);
  ctx.fillRect(w/2-10, -h/2+2, 7, 5);
  ctx.restore();
}

function lighten(hex, amt){
  const c = hex.replace('#','');
  const num = parseInt(c,16);
  let r = (num>>16)+amt, g=((num>>8)&0xff)+amt, b=(num&0xff)+amt;
  r=Math.min(255,r); g=Math.min(255,g); b=Math.min(255,b);
  return `rgb(${r},${g},${b})`;
}

function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r);
  ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r);
  ctx.arcTo(x,y,x+w,y,r);
  ctx.closePath();
}

function drawTraffic(){
  const cx = roadCenterX();
  for(const t of traffic){
    drawCar(cx+t.laneX, t.y, t.w, t.h, t.color, '#1a2230');
  }
}

function drawParticles(){
  for(const p of particles){
    ctx.globalAlpha = Math.max(p.life/0.5, 0);
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x-2, p.y-2, 4, 4);
  }
  ctx.globalAlpha = 1;
}

function drawPlayer(){
  const cx = roadCenterX()+player.x;
  drawCar(cx, player.y, CAR_W, CAR_H, '#ff3344', '#bfe8ff');
}

function render(){
  ctx.save();
  if(shake > 0){
    ctx.translate((Math.random()-0.5)*shake*14, (Math.random()-0.5)*shake*14);
  }
  drawRoad();
  drawTraffic();
  drawPlayer();
  drawParticles();
  ctx.restore();
}

function loop(now){
  const dt = Math.min((now-lastT)/1000, 0.05);
  lastT = now;
  update(dt);
  render();
  requestAnimationFrame(loop);
}

render();
requestAnimationFrame(loop);
</script>
</body>
</html>
